# Fabrik PRO — React SPA (Vite). Served on :8081 (no domain yet).
#
# Assets are content-hashed → cache forever; index.html is never cached so
# every deploy is visible immediately (no hard-refresh). /api is proxied to the
# Fabrik backend, keeping the /api/v1 prefix — mirrors the dev Vite proxy, so
# the same frontend code works in dev and prod with no CORS.
#
# Installed by deploy/server-setup.sh as /etc/nginx/sites-available/fabrik.
# When you add a domain later: certbot --nginx -d app.example.uz (certbot is
# already installed on the server) and switch listen 8081 → 80/443.
server {
    listen 8081;
    server_name _;

    root /var/www/fabrik/current;
    index index.html;
    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://46.225.154.145;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
