name: Deploy

# CI on every push/PR to main: type-check, lint, build.
# CD only on push to main: ship the built dist/ to the server over SSH.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Never run two deploys for the same ref at once.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Prod uses the nginx /api proxy → keep the API origin empty so the
          # app calls the relative /api/v1 (mirrors the dev Vite proxy). Set the
          # repo Variable VITE_API_BASE_URL only if you serve the API elsewhere.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_DEFAULT_LOCALE: ${{ vars.VITE_DEFAULT_LOCALE || 'ru' }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'Fabric PRO' }}
          VITE_YANDEX_MAPS_API_KEY: ${{ secrets.VITE_YANDEX_MAPS_API_KEY }}
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 5

  deploy:
    name: Deploy to server
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4 # for scripts/deploy.sh

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: bash scripts/deploy.sh
